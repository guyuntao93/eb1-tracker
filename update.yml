name: Update Visa Bulletin Data

on:
  schedule:
    # Runs every day at 12:00 UTC. Visa Bulletins are monthly, so most days
    # nothing changes and no commit is made — it just catches the new one fast.
    - cron: "0 12 * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write          # allow the job to commit updated data back to the repo

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch latest bulletin and update data
        run: python update_data.py

      - name: Commit changes if any
        run: |
          if [ -n "$(git status --porcelain index.html)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Auto-update visa bulletin data"
            git push
            echo "Committed updated data."
          else
            echo "No changes to commit."
          fi
